[RetroScreen]
UseUnrealLibretroCore=false
LibretroCorePath=Plugins/UnrealLibretro/MyCores/puae_libretro.dll
LibretroRomPath=EmulatorData/Xenon2.adf
RuntimeRegion=PAL
EnableCrt=true
RuntimeAudioVolume=1.0

DefaultJoypadPort=0
DefaultJoypadDeadzone=8192
DefaultJoypadMapAxesToDpad=true
DefaultJoypadInvertY=false

[RetroScreenCoreOptions]
; Optional core-specific overrides loaded by environment callback
; puae_model=a500
; puae_cpu_compatibility=normal

LogRuntimeMetrics=true
RuntimeMetricsLogIntervalSeconds=2.0

ExportRuntimeMetricsCsv=true
RuntimeMetricsCsvExportIntervalSeconds=2.0
RuntimeMetricsCsvPath=Saved/RetroScreenMetrics.csv

LogRuntimeQualityGate=true
RuntimeQualityGateLogIntervalSeconds=2.0

QualityGateMinTextureUploads=30
QualityGateMaxAverageUploadMs=4.0
QualityGateMaxPeakUploadMs=12.0
QualityGateMaxTextureUploadFailures=0
QualityGateMaxAudioUnderrunSamples=0
QualityGateMaxAudioOverrunSamples=0
